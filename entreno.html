<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plan de Entrenamiento - Entreno</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
    <!-- Chart.js y adaptador de fecha -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/date-fns"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000000; /* Fondo negro puro */
            color: #E0E0E0;
            padding-bottom: 2rem;
        }

        /* --- Botones de Navegación (Días) --- */
        .day-nav-button {
            border: 1px solid #3f3f46;
            background: #18181b;
            color: #e5e7eb;
            border-radius: 10px;
            padding: 8px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 60px;
            text-align: center;
            transition: all 0.2s ease-in-out;
        }
        .day-nav-button span {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
        }
        .day-nav-button.active {
            border-color: #facc15;
            background-color: #27272a;
            box-shadow: 0 0 15px rgba(250, 204, 21, 0.1);
        }
        .day-nav-button-hd { background: linear-gradient(135deg, #e5e7eb 0%, #9ca3af 100%); color: black; border: none; }
        .day-nav-button-bilbo { background: linear-gradient(135deg, #fde047 0%, #a16207 100%); color: black; border: none; }
        .day-nav-button-rest { background-color: #0ea5e9; color: white; border-color: #0ea5e9; } 

        /* --- Cabecera --- */
        .header-background {
            position: relative;
            border-radius: 1.5rem;
            overflow: hidden;
            border: 1px solid #3f3f46;
            margin-bottom: 1.5rem;
        }
        .header-image {
            display: block;
            width: 100%;
            height: auto;
        }
        .header-content {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 1.5rem;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }
        @media (max-width: 639px) {
            .header-content { padding: 1rem; align-items: center; }
            .header-content h1 { font-size: 1.5rem; line-height: 1.2; }
            .header-content p { font-size: 1rem; }
            #stopwatch-display { font-size: 1.5rem; }
        }

        /* --- Tarjeta de Ejercicio --- */
        .exercise-card {
            background-color: #121212;
            border: 1px solid #27272a;
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }
        .exercise-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }
        .exercise-title {
            color: #22d3ee; /* Azul cian */
            font-size: 1.15rem;
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 0.5rem;
        }
        .exercise-tips {
            font-size: 0.8rem;
            color: #a1a1aa;
            line-height: 1.4;
        }
        .timer-clock {
            width: 50px; height: 50px; border-radius: 50%;
            border: 2px solid #facc15; color: #facc15;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 0.9rem; background-color: rgba(0,0,0,0.5);
            flex-shrink: 0; margin-left: 0.5rem; cursor: pointer;
        }
        .timer-running { background-color: #facc15; color: black; }

        /* --- NUEVO DISEÑO DE SERIE (Bloques Limpios) --- */
        .set-row-block {
            /* Este es el contenedor de cada serie individual */
            background-color: #18181b; 
            border-bottom: 1px solid #27272a;
            padding: 1rem 0.5rem;
        }
        .set-row-block:last-child {
            border-bottom: none;
        }
        .set-row-block.effective-set {
            /* Diferenciación sutil para la serie efectiva */
            background-color: #1c1917; 
        }

        .set-info-top {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 0.75rem;
        }
        .set-name {
            font-weight: 700;
            font-size: 0.9rem;
            color: #e5e5e5;
        }
        .set-meta {
            font-size: 0.75rem;
            color: #a1a1aa;
        }
        .set-meta strong { color: #facc15; }

        .set-inputs-container {
            display: flex;
            justify-content: center; /* Centrados en móvil */
            gap: 1.5rem;
        }

        .input-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 85px; /* Ancho fijo pedido */
        }

        .input-label {
            font-size: 0.7rem;
            color: #71717a;
            margin-bottom: 4px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .data-input {
            width: 100%;
            height: 45px;
            background-color: #000000;
            border: 1px solid #3f3f46;
            border-radius: 0.5rem;
            color: white;
            font-size: 1.25rem;
            font-weight: 700;
            text-align: center;
            padding: 0;
            transition: border-color 0.2s;
        }
        .data-input:focus {
            outline: none;
            border-color: #22d3ee;
        }

        /* Estilos específicos para serie efectiva */
        .effective-set .weight-input {
            border-color: #facc15; /* Solo borde dorado en peso */
            box-shadow: 0 0 8px rgba(250, 204, 21, 0.15);
        }
        /* Reps sin borde especial */

        .last-data-text {
            margin-top: 4px;
            font-size: 0.75rem;
            color: #52525b;
            text-align: center;
        }

        /* --- Checkbox --- */
        .check-container {
            display: flex; align-items: center; gap: 0.75rem;
            margin-top: 1rem; padding-top: 0.5rem;
            border-top: 1px solid #27272a;
            color: #a1a1aa; font-size: 0.9rem;
            cursor: pointer;
        }
        .custom-checkbox {
            width: 1.5rem; height: 1.5rem;
            border: 2px solid #52525b; border-radius: 0.35rem;
            appearance: none; background-color: transparent;
            position: relative; cursor: pointer;
        }
        .custom-checkbox:checked {
            background-color: #22c55e; border-color: #22c55e;
        }
        .custom-checkbox:checked::after {
            content: '✓'; position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; font-weight: bold; font-size: 1rem;
        }
        .completed-card { opacity: 0.6; filter: grayscale(0.5); }

        /* Modales */
        .modal { background-color: rgba(0,0,0,0.9); backdrop-filter: blur(4px); }
        .modal-box { background-color: #18181b; border: 1px solid #3f3f46; border-radius: 1rem; }
        
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
    </style>
</head>
<body class="p-4">

    <div class="max-w-md mx-auto">
        
        <!-- Cabecera -->
        <header class="header-background">
            <img src="https://yaril.netlify.app/metodohibridobigcolor3.jpg" alt="Cabecera" class="header-image">
            <div class="header-content">
                <div>
                    <h1 id="main-title" class="text-2xl font-black text-white uppercase tracking-wide">HEAVY DUTY</h1>
                    <p id="workout-title" class="text-lg font-bold text-yellow-400">PUSH</p>
                </div>
                <div class="text-right">
                    <div id="stopwatch-display" class="text-2xl font-mono font-bold text-white mb-1">00:00</div>
                    <button id="stopwatch-control" class="text-xs bg-zinc-800 hover:bg-zinc-700 text-white py-1 px-3 rounded border border-zinc-600 uppercase tracking-wider">
                        Start / End
                    </button>
                </div>
            </div>
        </header>

        <!-- Días -->
        <div id="tabs" class="grid grid-cols-7 gap-1 mb-6"></div>

        <!-- Contenido del Entreno -->
        <main id="workout-content" class="space-y-4"></main>

        <!-- Botón Inicio -->
        <div class="mt-8 text-center">
            <a href="index.html" class="inline-block px-8 py-3 rounded-lg bg-zinc-900 hover:bg-zinc-800 text-zinc-400 hover:text-white font-bold uppercase tracking-wider transition-colors border border-zinc-800 text-sm">
                Inicio
            </a>
        </div>
    </div>

    <!-- Modales -->
    <div id="notification" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-emerald-600 text-white py-2 px-6 rounded-full shadow-xl opacity-0 transform translate-y-10 transition-all duration-300 z-50 font-medium text-sm">
        Entrenamiento guardado
    </div>

    <div id="pause-modal" class="modal fixed inset-0 flex items-center justify-center hidden p-4 z-50">
        <div class="modal-box p-6 w-full max-w-sm text-center">
            <h2 class="text-xl font-bold mb-6 text-white">Entrenamiento Pausado</h2>
            <div class="flex gap-3">
                <button id="resume-btn" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white py-3 rounded-lg font-bold">Reanudar</button>
                <button id="finish-btn" class="flex-1 bg-red-600 hover:bg-red-700 text-white py-3 rounded-lg font-bold">Terminar</button>
            </div>
        </div>
    </div>

    <div id="finish-confirm-modal" class="modal fixed inset-0 flex items-center justify-center hidden p-4 z-50">
        <div class="modal-box p-6 w-full max-w-sm text-center">
            <h2 class="text-lg font-bold mb-6 text-white">¿Finalizar y Guardar?</h2>
            <div class="flex gap-3">
                <button id="confirm-finish-no-btn" class="flex-1 bg-zinc-700 hover:bg-zinc-600 text-white py-3 rounded-lg font-bold">Cancelar</button>
                <button id="confirm-finish-yes-btn" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white py-3 rounded-lg font-bold">Guardar</button>
            </div>
        </div>
    </div>

    <div id="progression-modal" class="modal fixed inset-0 flex items-center justify-center hidden p-4 z-50">
        <div class="modal-box p-6 w-full max-w-sm text-center">
            <h2 class="text-xl font-bold mb-2 text-white">¡Buen trabajo!</h2>
            <p id="progression-modal-text" class="text-gray-400 text-sm mb-6"></p>
            <div class="flex gap-3">
                <button id="progress-no-btn" class="flex-1 bg-zinc-700 text-white py-3 rounded-lg font-bold text-sm">No, mantener</button>
                <button id="progress-yes-btn" class="flex-1 bg-emerald-600 text-white py-3 rounded-lg font-bold text-sm">Sí, subir peso</button>
            </div>
        </div>
    </div>

    <div id="bilbo-cycle-modal" class="modal fixed inset-0 flex items-center justify-center hidden p-4 z-50">
        <div class="modal-box p-6 w-full max-w-sm text-center">
            <h2 class="text-xl font-bold mb-2 text-yellow-400">¡Ciclo Completado!</h2>
            <p id="bilbo-cycle-text" class="text-gray-300 text-sm mb-6"></p>
            <button id="bilbo-cycle-ok-btn" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold">Entendido</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // --- Configuration ---
            const workouts = {
                hd_push: { title: "HEAVY DUTY — PUSH", type: 'hd', exercises: [ 
                    { name: "Press inclinado con barra", rmPercentage: "30 / 50 / 80", seriesCount: 3, sets: [{reps: 15}, {reps: 10}, {reps: 6}], dropSet: false, tip: "3s↓ / 1-2s↑. Evita mirar arriba.", rest: 135 },
                    { name: "Press en suelo con barra", rmPercentage: "30 / 50 / 80", seriesCount: 3, sets: [{reps: 15}, {reps: 10}, {reps: 6}], dropSet: true, tip: "3s↓ / 1s pausa / 1s↑. Cuello neutro.", rest: 165 },
                    { name: "Landmine Diagonal de Pie", rmPercentage: "30 / 50 / 80", seriesCount: 3, sets: [{reps: 15}, {reps: 10}, {reps: 6}], dropSet: false, tip: "2s↓ / 1s↑. Empuje diagonal.", rest: 135 },
                    { name: "Elevaciones laterales sentado", rmPercentage: "30 / 50 / 80", seriesCount: 3, sets: [{reps: 15}, {reps: 10}, {reps: 6}], dropSet: true, tip: "2s↓ / 1s↑. Movimiento limpio.", rest: 105 },
                    { name: "Extensión tríceps polea cuerda", rmPercentage: "30 / 50 / 80", seriesCount: 3, sets: [{reps: 15}, {reps: 10}, {reps: 6}], dropSet: true, tip: "2s↓ / 1s↑. Hombros bajos.", rest: 105 }, 
                ] },
                rest1: { title: "CARDIO", type: 'rest', exercises: [ { name: "Cardio Z2", tip: "Caminata larga o cardio suave.", rest: 0 } ] },
                hd_pull: { title: "HEAVY DUTY — PULL", type: 'hd', exercises: [ 
                    { name: "Jalón polea agarre neutro", rmPercentage: "30 / 50 / 80", seriesCount: 3, sets: [{reps: 15}, {reps: 10}, {reps: 6}], dropSet: true, tip: "3s↓ / 1s pausa / 1-2s↑. Controla la subida.", rest: 165 },
                    { name: "Remo con barra T", rmPercentage: "30 / 50 / 80", seriesCount: 3, sets: [{reps: 15}, {reps: 10}, {reps: 6}], dropSet: false, tip: "3s↓ / 1s↑. Espalda recta.", rest: 165 },
                    { name: "Pájaros (reverse fly)", rmPercentage: "30 / 50 / 80", seriesCount: 3, sets: [{reps: 15}, {reps: 10}, {reps: 6}], dropSet: true, tip: "3s↓ / 1s↑ / 1s pausa.", rest: 105 },
                    { name: "Curl bíceps Mentzer (polea)", rmPercentage: "30 / 50 / 80", seriesCount: 3, sets: [{reps: 15}, {reps: 10}, {reps: 6}], dropSet: true, tip: "3s↓ / 1s↑ / 1s contracción.", rest: 105 },
                    { name: "Face Pull (polea a cara)", rmPercentage: "30 / 50 / 80", seriesCount: 3, sets: [{reps: 15}, {reps: 10}, {reps: 6}], dropSet: false, tip: "2s↓ / 1s↑. Rotación externa.", rest: 105 }, 
                ] },
                rest2: { title: "CARDIO", type: 'rest', exercises: [ { name: "Cardio Z2", tip: "Caminata larga o cardio suave.", rest: 0 } ] },
                bilbo_push: { title: "BILBO — PUSH", type: 'bilbo', exercises: [ 
                    { name: "Press de banca plano", rmPercentage: "50 / 65 / 75", seriesCount: 3, sets: [{reps: '15-50'}, {reps: '10-15'}, {reps: '8-12'}], dropSet: false, tip: "Ejecución rápida. Sin bloqueo.", rest: 105 },
                    { name: "Landmine Rodilla al Suelo", rmPercentage: "50 / 65 / 75", seriesCount: 3, sets: [{reps: '15-50'}, {reps: '10-15'}, {reps: '8-12'}], dropSet: false, tip: "Ejecución rápida. Empuje diagonal.", rest: 105 },
                    { name: "Elevaciones laterales gomas", rmPercentage: "60 / 70 / 75", seriesCount: 3, sets: [{reps: '15-50'}, {reps: '10-15'}, {reps: '8-12'}], dropSet: false, tip: "Ejecución rápida.", rest: 75 },
                    { name: "Fondos agarre neutro", rmPercentage: "55 / 65 / 75", seriesCount: 3, sets: [{reps: '15-50'}, {reps: '10-15'}, {reps: '8-12'}], dropSet: false, tip: "Ejecución rápida.", rest: 105 },
                    { name: "Cruces con goma (pecho)", rmPercentage: "55 / 65 / 70", seriesCount: 3, sets: [{reps: '15-50'}, {reps: '10-15'}, {reps: '8-12'}], dropSet: false, tip: "Ejecución rápida.", rest: 75 }, 
                ] },
                rest3: { title: "CARDIO", type: 'rest', exercises: [ { name: "Cardio Z2", tip: "Caminata larga o cardio suave.", rest: 0 } ] },
                bilbo_pull: { title: "BILBO — PULL", type: 'bilbo', exercises: [ 
                    { name: "Jalón pecho agarre estrecho", rmPercentage: "50 / 65 / 75", seriesCount: 3, sets: [{reps: '15-50'}, {reps: '10-15'}, {reps: '8-12'}], dropSet: false, tip: "Ejecución rápida.", rest: 120 },
                    { name: "Remo bajo polea (neutro)", rmPercentage: "55 / 70 / 75", seriesCount: 3, sets: [{reps: '15-50'}, {reps: '10-15'}, {reps: '8-12'}], dropSet: false, tip: "Ejecución rápida.", rest: 120 },
                    { name: "Remo Inclinado Mancuernas", rmPercentage: "55 / 65 / 75", seriesCount: 3, sets: [{reps: '15-50'}, {reps: '10-15'}, {reps: '8-12'}], dropSet: false, tip: "Ejecución rápida.", rest: 120 },
                    { name: "Curl en barra Z", rmPercentage: "55 / 65 / 75", seriesCount: 3, sets: [{reps: '15-50'}, {reps: '10-15'}, {reps: '8-12'}], dropSet: false, tip: "Ejecución rápida.", rest: 75 }, 
                ] }
            };
            const days = ['hd_push', 'rest1', 'hd_pull', 'rest2', 'bilbo_push', 'rest3', 'bilbo_pull'];
            const dayNames = { hd_push: 'HD PUSH', rest1: 'CARDIO', hd_pull: 'HD PULL', rest2: 'CARDIO', bilbo_push: 'BILBO PUSH', rest3: 'CARDIO', bilbo_pull: 'BILBO PULL' };
            
            let e1rmMap = new Map(); 
            const state = { activeTimers: {}, stopwatchInterval: null, totalSeconds: 0, isStopwatchRunning: false };
            
            const DOM = {
                tabsContainer: document.getElementById('tabs'),
                contentContainer: document.getElementById('workout-content'),
                mainTitle: document.getElementById('main-title'),
                workoutTitle: document.getElementById('workout-title'),
                stopwatchDisplay: document.getElementById('stopwatch-display'),
                stopwatchControlBtn: document.getElementById('stopwatch-control'),
                pauseModal: document.getElementById('pause-modal'),
                finishConfirmModal: document.getElementById('finish-confirm-modal'),
                progressionModal: document.getElementById('progression-modal'),
                bilboCycleModal: document.getElementById('bilbo-cycle-modal'),
                notification: document.getElementById('notification'),
                resumeBtn: document.getElementById('resume-btn'),
                finishBtn: document.getElementById('finish-btn'),
                confirmFinishYesBtn: document.getElementById('confirm-finish-yes-btn'),
                confirmFinishNoBtn: document.getElementById('confirm-finish-no-btn'),
                progressYesBtn: document.getElementById('progress-yes-btn'),
                progressNoBtn: document.getElementById('progress-no-btn'),
                bilboCycleOkBtn: document.getElementById('bilbo-cycle-ok-btn'),
                progressionModalText: document.getElementById('progression-modal-text'),
                bilboCycleText: document.getElementById('bilbo-cycle-text'),
            };

            const getTodayDateString = () => new Date().toISOString().split('T')[0];
            
            const calculateLombardi = (weight, reps) => {
                if (reps <= 0 || weight <= 0) return 0;
                return parseFloat(weight) * Math.pow(parseFloat(reps), 0.10);
            };
            
            const calculateAllEstimated1RMs = () => {
                const history = JSON.parse(localStorage.getItem('workoutHistory')) || {};
                const exercisesToTrack = [
                    "Press de banca plano (barra)", "Curl en barra Z",
                    "Jalón en polea agarre neutro", "Jalón al pecho agarre estrecho"
                ];
                const map = new Map();
                for (const date in history) {
                    const log = history[date];
                    if (log && Array.isArray(log.exercises)) {
                        log.exercises.forEach(ex => {
                            if (exercisesToTrack.includes(ex.name) && Array.isArray(ex.series)) {
                                ex.series.forEach(s => {
                                    const w = parseFloat(s.weight), r = parseInt(s.reps, 10);
                                    if (w > 0 && r > 0) {
                                        const e1rm = calculateLombardi(w, r);
                                        if (e1rm > (map.get(ex.name) || 0)) map.set(ex.name, e1rm);
                                    }
                                });
                            }
                        });
                    }
                }
                return map;
            };

            function generateWorkoutHTML() {
                days.forEach(day => {
                    const dayContainer = document.createElement('div');
                    dayContainer.id = day;
                    dayContainer.className = 'workout-day hidden';
                    const workout = workouts[day];

                    workout.exercises.forEach((exercise, exIndex) => {
                        const isStrengthDay = workout.type !== 'rest';
                        const card = document.createElement('div');
                        card.className = 'exercise-card';
                        card.dataset.day = day;
                        card.dataset.exIndex = exIndex;

                        let headerHTML = `
                            <div class="exercise-header">
                                <div class="flex-grow mr-4">
                                    <h3 class="exercise-title">${exercise.name}</h3>
                                    <div class="exercise-tips">${exercise.tip}</div>
                                </div>
                                ${isStrengthDay ? `
                                    <div class="timer-clock timer-yellow" data-duration="${exercise.rest}">
                                        ${Math.floor(exercise.rest / 60)}:${(exercise.rest % 60).toString().padStart(2, '0')}
                                    </div>
                                ` : ''}
                            </div>
                        `;

                        let setsHTML = '';
                        if (isStrengthDay) {
                            const rmValues = exercise.rmPercentage ? exercise.rmPercentage.replace(/%/g, '').split('/').map(v => v.trim()) : [];
                            
                            exercise.sets.forEach((set, setIndex) => {
                                const isBilboDay = day.includes('bilbo');
                                const isEffective = (isBilboDay && setIndex === 0) || (!isBilboDay && setIndex === exercise.sets.length - 1);
                                const rowClass = isEffective ? 'effective-set' : '';
                                
                                let seriesName = isBilboDay 
                                    ? (setIndex === 0 ? 'Serie Bilbo' : `Serie ${setIndex + 1}`) 
                                    : (isEffective ? 'Serie' : `Calentamiento ${setIndex + 1}`);
                                
                                const currentRm = rmValues[setIndex] || (rmValues.length === 1 ? rmValues[0] : '');
                                const rmDisplay = currentRm ? (isNaN(currentRm) ? currentRm : `${currentRm}%`) : '';

                                setsHTML += `
                                    <div class="set-row-block ${rowClass}"> <!-- CLASE IMPORTANTE: set-row-block -->
                                        <div class="set-info-top">
                                            <span class="set-name">${seriesName}</span>
                                            <span class="set-meta">
                                                Rep. aconsejadas: <strong>${set.reps}</strong> | RM: <strong>${rmDisplay}</strong>
                                            </span>
                                        </div>
                                        
                                        <div class="set-inputs-container">
                                            <!-- Peso -->
                                            <div class="input-wrapper">
                                                <label class="input-label">PESO (KG)</label>
                                                <input type="number" step="0.5" class="data-input weight-input" placeholder="0"
                                                     data-day="${day}" data-ex-index="${exIndex}" data-set-index="${setIndex}">
                                                <div class="last-data-text">
                                                    <span class="last-weight-cell font-bold text-zinc-500">-</span> kg
                                                </div>
                                            </div>
                                            <!-- Reps -->
                                            <div class="input-wrapper">
                                                <label class="input-label">REPS</label>
                                                <input type="number" class="data-input reps-input" placeholder="0"
                                                     data-day="${day}" data-ex-index="${exIndex}" data-set-index="${setIndex}">
                                                <div class="last-data-text">
                                                    <span class="last-reps-cell font-bold text-zinc-500">-</span> reps
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                `;
                            });
                        } else {
                            setsHTML = `
                                <div class="set-row-block">
                                    <div class="set-inputs-container">
                                        <div class="input-wrapper" style="width: 100px;">
                                            <label class="input-label">TIEMPO (MIN)</label>
                                            <input type="number" step="1" class="data-input weight-input" placeholder="0" data-day="${day}" data-ex-index="${exIndex}" data-set-index="0">
                                        </div>
                                        <div class="input-wrapper" style="width: 100px;">
                                            <label class="input-label">PULSO (BPM)</label>
                                            <input type="number" class="data-input reps-input" placeholder="0" data-day="${day}" data-ex-index="${exIndex}" data-set-index="0">
                                        </div>
                                    </div>
                                </div>
                            `;
                        }

                        card.innerHTML = headerHTML + setsHTML + `
                            <label class="check-container">
                                <input type="checkbox" class="custom-checkbox" data-day="${day}" data-ex-index="${exIndex}">
                                <span>Marcar como completado</span>
                            </label>
                        `;
                        
                        dayContainer.appendChild(card);
                    });
                    DOM.contentContainer.appendChild(dayContainer);
                });
            }

            function showDay(dayToShow) {
                document.querySelectorAll('.workout-day').forEach(el => el.classList.add('hidden'));
                document.querySelectorAll('.day-nav-button').forEach(btn => btn.classList.remove('active'));
                
                const btn = document.querySelector(`.day-nav-button[data-day="${dayToShow}"]`);
                if (btn) btn.classList.add('active');
                
                const dayContent = document.getElementById(dayToShow);
                if (dayContent) dayContent.classList.remove('hidden');
                
                const workoutInfo = workouts[dayToShow];
                if (workoutInfo) {
                    if (dayToShow.includes('hd')) {
                        DOM.mainTitle.textContent = "HEAVY DUTY";
                        DOM.workoutTitle.innerHTML = dayToShow.includes('push') ? "PUSH" : "PULL";
                    } else if (dayToShow.includes('bilbo')) {
                        DOM.mainTitle.textContent = "MÉTODO BILBO";
                        const cycle = localStorage.getItem('bilboCycleCount') || '1';
                        const type = dayToShow.includes('push') ? "PUSH" : "PULL";
                        DOM.workoutTitle.innerHTML = `${type} <span class="text-white text-sm font-normal ml-2">Ciclo ${cycle}</span>`;
                    } else {
                        DOM.mainTitle.textContent = "CARDIO";
                        DOM.workoutTitle.innerHTML = "Descanso Activo (Z2)";
                    }
                }
            }

            // --- Timers ---
            function startTimer(duration, element) {
                const timerId = `${element.dataset.day}-${element.dataset.exIndex}`; 
                if (state.activeTimers[timerId]) clearInterval(state.activeTimers[timerId]);
                
                element.classList.add('timer-running');
                let t = duration;
                
                state.activeTimers[timerId] = setInterval(() => {
                    const m = Math.floor(t / 60);
                    const s = t % 60;
                    element.textContent = `${m}:${s.toString().padStart(2,'0')}`;
                    t--;
                    if (t < 0) {
                        clearInterval(state.activeTimers[timerId]);
                        element.classList.remove('timer-running');
                        element.textContent = "0:00";
                        const synth = new Tone.Synth().toDestination();
                        synth.triggerAttackRelease("C5", "8n");
                    }
                }, 1000);
            }

            function toggleStopwatch() {
                if (state.isStopwatchRunning) {
                    state.isStopwatchRunning = false;
                    clearInterval(state.stopwatchInterval);
                    DOM.pauseModal.classList.remove('hidden');
                } else {
                    state.isStopwatchRunning = true;
                    DOM.stopwatchControlBtn.textContent = "Pausar / End";
                    state.stopwatchInterval = setInterval(() => {
                        state.totalSeconds++;
                        const h = Math.floor(state.totalSeconds / 3600).toString().padStart(2,'0');
                        const m = Math.floor((state.totalSeconds % 3600) / 60).toString().padStart(2,'0');
                        const s = (state.totalSeconds % 60).toString().padStart(2,'0');
                        DOM.stopwatchDisplay.textContent = `${h}:${m}:${s}`;
                    }, 1000);
                }
            }

            // --- Load & Save ---
            function loadLastPerformance(map) {
                const history = JSON.parse(localStorage.getItem('workoutHistory')) || {};
                const dates = Object.keys(history).sort().reverse();
                const bilboResets = JSON.parse(localStorage.getItem('bilboResetFlags')) || {};
                const progFlags = JSON.parse(localStorage.getItem('progressionFlags')) || {};

                document.querySelectorAll('.exercise-card').forEach(card => {
                    const day = card.dataset.day;
                    const exIdx = parseInt(card.dataset.exIndex);
                    const exName = workouts[day].exercises[exIdx].name;
                    const isBilbo = day.includes('bilbo');

                    // Reset inputs
                    card.querySelectorAll('input[type="number"]').forEach(i => i.value = '');
                    
                    // Find last log
                    let lastLog = null;
                    for (let d of dates) {
                        const s = history[d].exercises.find(e => e.name === exName);
                        if (s) { lastLog = s; break; }
                    }

                    // Update "Last" displays
                    const lastWeights = card.querySelectorAll('.last-weight-cell');
                    const lastReps = card.querySelectorAll('.last-reps-cell');
                    
                    if (lastLog && lastLog.series) {
                        lastLog.series.forEach((s, i) => {
                            if (lastWeights[i]) lastWeights[i].textContent = s.weight;
                            if (lastReps[i]) lastReps[i].textContent = s.reps;
                        });
                    }

                    // Suggest Weights
                    const inputs = card.querySelectorAll('.weight-input');
                    const rmStr = workouts[day].exercises[exIdx].rmPercentage || "";
                    const percentages = rmStr.split('/').map(s => parseFloat(s)/100);

                    if (isBilbo) {
                        const e1rm = map.get(exName) || 0;
                        
                        if (e1rm > 0) {
                             inputs.forEach((inp, idx) => {
                                const pct = percentages[idx] || 0.5;
                                inp.value = (e1rm * pct).toFixed(1);
                             });
                        }
                    } else if (day.includes('hd') && lastLog) {
                        lastLog.series.forEach((s, i) => {
                            if (inputs[i]) {
                                let w = parseFloat(s.weight);
                                if (i === 2 && progFlags[exName]) w *= 1.025; 
                                inputs[i].value = w.toFixed(1);
                            }
                        });
                    }
                });
            }

            function finishWorkout() {
                const today = getTodayDateString();
                const h = JSON.parse(localStorage.getItem('workoutHistory')) || {};
                const exercises = [];
                let dayKey = null;

                const activeBtn = document.querySelector('.day-nav-button.active');
                if(activeBtn) dayKey = activeBtn.dataset.day;

                if(dayKey) {
                    const cards = document.querySelectorAll(`.exercise-card[data-day="${dayKey}"]`);
                    const bilboResets = [];
                    const progChecks = [];

                    cards.forEach(card => {
                        const chk = card.querySelector('.custom-checkbox');
                        if (chk && chk.checked) {
                            const exName = card.querySelector('.exercise-title').textContent;
                            const series = [];
                            
                            // *** CORRECCIÓN CLAVE AQUÍ: Usar el selector correcto para los bloques ***
                            card.querySelectorAll('.set-row-block').forEach(row => { 
                                const w = row.querySelector('.weight-input').value;
                                const r = row.querySelector('.reps-input').value;
                                series.push({ weight: w, reps: r });
                            });
                            exercises.push({ name: exName, series });

                            if (dayKey.includes('bilbo') && series.length > 0) {
                                if (parseInt(series[0].reps) <= 15) bilboResets.push(exName);
                            }
                            if (dayKey.includes('hd') && series.length > 0) {
                                const lastSet = series[series.length-1];
                                if (parseInt(lastSet.reps) >= 6) progChecks.push(exName);
                            }
                        }
                    });

                    if (exercises.length > 0) {
                        h[today] = {
                            date: today,
                            time: DOM.stopwatchDisplay.textContent,
                            workoutTitle: workouts[dayKey].title,
                            workoutType: workouts[dayKey].type,
                            exercises: exercises
                        };
                        localStorage.setItem('workoutHistory', JSON.stringify(h));
                        
                        if (bilboResets.length > 0) {
                            const flags = JSON.parse(localStorage.getItem('bilboResetFlags')) || {};
                            bilboResets.forEach(n => flags[n] = true);
                            localStorage.setItem('bilboResetFlags', JSON.stringify(flags));
                            DOM.bilboCycleText.textContent = `Has completado el ciclo para: ${bilboResets.join(', ')}. Se recalcularán los pesos.`;
                            DOM.bilboCycleModal.classList.remove('hidden');
                        }
                        
                        if (progChecks.length > 0) {
                            window.pendingProgressions = progChecks;
                            showNextProgressModal();
                        }
                        
                        DOM.notification.classList.remove('opacity-0', 'translate-y-10');
                        setTimeout(() => DOM.notification.classList.add('opacity-0', 'translate-y-10'), 3000);
                    }
                }
                
                state.isStopwatchRunning = false;
                clearInterval(state.stopwatchInterval);
                DOM.stopwatchControlBtn.textContent = "Start / End";
            }

            function showNextProgressModal() {
                if (!window.pendingProgressions || window.pendingProgressions.length === 0) return;
                const exName = window.pendingProgressions.shift();
                window.currentProgressionEx = exName;
                document.getElementById('progression-modal-text').textContent = `¿Serie perfecta en ${exName}? ¿Subir peso?`;
                document.getElementById('progression-modal').classList.remove('hidden');
            }

            // --- Init ---
            days.forEach(d => {
                const btn = document.createElement('div');
                btn.className = `day-nav-button ${d.includes('hd') ? 'day-nav-button-hd' : d.includes('bilbo') ? 'day-nav-button-bilbo' : 'day-nav-button-rest'}`;
                btn.dataset.day = d;
                btn.innerHTML = `<span>${dayNames[d]}</span>`;
                btn.addEventListener('click', () => showDay(d));
                DOM.tabsContainer.appendChild(btn);
            });

            generateWorkoutHTML();
            
            DOM.stopwatchControlBtn.addEventListener('click', toggleStopwatch);
            DOM.resumeBtn.addEventListener('click', () => { DOM.pauseModal.classList.add('hidden'); toggleStopwatch(); });
            DOM.finishBtn.addEventListener('click', () => { DOM.pauseModal.classList.add('hidden'); DOM.finishConfirmModal.classList.remove('hidden'); });
            
            document.getElementById('confirm-finish-no-btn').addEventListener('click', () => DOM.finishConfirmModal.classList.add('hidden'));
            document.getElementById('confirm-finish-yes-btn').addEventListener('click', () => { DOM.finishConfirmModal.classList.add('hidden'); finishWorkout(); });
            
            document.getElementById('bilbo-cycle-ok-btn').addEventListener('click', () => DOM.bilboCycleModal.classList.add('hidden'));
            
            document.getElementById('progress-no-btn').addEventListener('click', () => {
                document.getElementById('progression-modal').classList.add('hidden');
                showNextProgressModal();
            });
            document.getElementById('progress-yes-btn').addEventListener('click', () => {
                const flags = JSON.parse(localStorage.getItem('progressionFlags')) || {};
                flags[window.currentProgressionEx] = true;
                localStorage.setItem('progressionFlags', JSON.stringify(flags));
                document.getElementById('progression-modal').classList.add('hidden');
                showNextProgressModal();
            });

            DOM.contentContainer.addEventListener('click', e => {
                if (e.target.classList.contains('timer-clock')) startTimer(e.target.dataset.duration, e.target);
                if (e.target.classList.contains('custom-checkbox')) {
                    e.target.closest('.exercise-card').classList.toggle('completed-card', e.target.checked);
                }
            });

            e1rmMap = calculateAllEstimated1RMs();
            let startDay = days[0];
            showDay(startDay);
            loadLastPerformance(e1rmMap);

        });
    </script>
</body>
</html>
