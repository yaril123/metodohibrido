<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Método Híbrido - Home</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Fuente -->
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
  <!-- Iconos -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      padding: 0rem 0;
      background-color: #000000;
      color: #000000;
      font-family: "Montserrat", sans-serif;
      background-attachment: fixed;
    }

    .wrapper {
      width: 100%;
      max-width: 480px;
      padding: 2px 22px 30px;
      text-align: center;
      margin: 0 auto;
    }

    /* Logo */
    .logo-img {
      width: 100%;
      max-width: 640px;
      margin: 0 auto 18px auto;
      display: block;
      filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.7)) contrast(130%);
      user-select: none;
    }

    .tagline {
      margin-top: 4px;
      font-size: 28px;
      font-weight: 600;
      color: #aaaaaa;
      text-shadow: 0 0 4px rgba(255, 193, 7, 0.8);
    }

    .mentzer {
      margin-top: 4px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 200;
      font-size: 23px;
      letter-spacing: 1px;
      color: #d0d0d0;
      text-transform: uppercase;
      text-shadow: 0 0 0px rgba(0, 0, 0, 0.0);
    }

    /* Perfil de Usuario / Login */
    .user-section {
      margin-top: 20px;
      padding: 10px;
      background: #111;
      border-radius: 12px;
      border: 1px solid #333;
      color: #ddd;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .user-info {
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .user-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background-color: #333;
    }

    .auth-btn {
      background-color: #FFC107;
      color: #000;
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
      transition: transform 0.1s;
      text-transform: uppercase;
    }
    
    .auth-btn.logout {
      background-color: #333;
      color: #fff;
      font-size: 0.8rem;
    }

    .auth-btn:hover {
      transform: scale(1.05);
    }

    .sync-status {
      font-size: 0.75rem;
      color: #888;
      margin-top: 5px;
      height: 20px; /* Espacio reservado */
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }

    /* MENÚ */
    .menu {
      margin-top: 25px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .menu-btn {
      display: flex;
      flex-direction: row;
      justify-content: center;
      align-items: center;
      gap: 16px;
      padding: 12px 20px;
      border-radius: 20px;
      text-decoration: none;
      background: #111;
      color: #e5e5e5;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      box-shadow: 0 6px 0 #000, 0 0 0 1px rgba(255, 255, 255, 0.05);
      transition: 0.12s ease-out;
      cursor: pointer;
      border: none; /* Para botones que no son enlaces */
      width: 100%;
      font-family: "Montserrat", sans-serif;
      font-size: 1rem;
    }

    .menu-btn:hover {
      background: #161616;
      transform: translateY(2px);
      box-shadow: 0 3px 0 #000, 0 0 0 1px rgba(255, 255, 255, 0.08);
    }

    .menu-btn-icon {
      font-size: 24px;
      color: #e0dfdc;
    }

    /* Estilo especial para botón de sincronizar */
    .menu-btn.sync-btn {
      background: #1a1a1a;
      border: 1px solid #FFC107;
      color: #FFC107;
    }
    .menu-btn.sync-btn .menu-btn-icon {
      color: #FFC107;
    }

    .label {
      font-size: 0.9rem;
    }

    /* Media query */
    @media (max-height: 700px) {
      .tagline { font-size: 32px; }
      .mentzer { font-size: 22px; }
      .wrapper { padding-top: 15px; padding-bottom: 15px; }
      .menu { margin-top: 20px; gap: 10px; }
      .menu-btn { padding: 14px 18px; }
      .menu-btn-icon { font-size: 22px; }
    }

    /* Chat Flotante */
    .chat-button {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background-color: #FFC107;
      color: #000;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 28px;
      text-decoration: none;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
      transition: transform 0.2s ease-out, background-color 0.2s ease;
      z-index: 1000;
    }

    .chat-button:hover {
      background-color: #ffd040;
      transform: scale(1.05);
    }
    
    /* Modal simple para mensajes */
    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: #fff;
      padding: 10px 20px;
      border-radius: 5px;
      z-index: 2000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      border: 1px solid #FFC107;
      text-align: center;
    }
    .toast.show {
      opacity: 1;
    }
  </style>
</head>

<body>
  <div id="toast" class="toast">Notificación</div>

  <div class="wrapper">

    <!-- LOGO REAL -->
    <img src="Logo.jpg" alt="Método Híbrido Logo" class="logo-img">

    <div class="tagline">
      Fuerza e hipertrofia <br>
      <span class="mentzer">Mentzer & Bilbo</span>
    </div>

    <!-- SECCIÓN DE USUARIO -->
    <div class="user-section" id="userSection" style="display: none;">
      <div class="user-info">
        <img id="userPhoto" src="" alt="Avatar" class="user-avatar">
        <span id="userName">Usuario</span>
      </div>
      <div class="sync-status" id="syncStatus"></div>
      <button id="logoutBtn" class="auth-btn logout">Cerrar Sesión</button>
    </div>

    <div class="user-section" id="loginSection">
      <span style="font-size: 0.8rem; margin-bottom: 5px;">Guarda tu progreso en la nube</span>
      <button id="loginBtn" class="auth-btn">
        <i class="fa-brands fa-google"></i> Entrar con Google
      </button>
    </div>

    <!-- MENÚ -->
    <nav class="menu">

      <a class='menu-btn' href='/metodohibrido/test'>
        <i class="fa-solid fa-star menu-btn-icon"></i>
        <span class="label">Test Inicial</span>
      </a>

      <a class='menu-btn' href='/metodohibrido/entreno'>
        <i class="fa-solid fa-dumbbell menu-btn-icon"></i>
        <span class="label">Entreno</span>
      </a>

      <a class='menu-btn' href='/metodohibrido/progreso'>
        <i class="fa-solid fa-chart-line menu-btn-icon"></i>
        <span class="label">Progreso</span>
      </a>

      <a class='menu-btn' href='/metodohibrido/nutricion'>
        <i class="fa-solid fa-utensils menu-btn-icon"></i>
        <span class="label">Nutrición</span>
      </a>

      <a class="menu-btn" href="/metodohibrido/metodo.html">
        <i class="fa-solid fa-book-open menu-btn-icon"></i>
        <span class="label">El método</span>
      </a>

      <a class='menu-btn' href='/metodohibrido/ajustes'>
        <i class="fa-solid fa-gear menu-btn-icon"></i>
        <span class="label">Ajustes</span>
      </a>
      
      <!-- BOTÓN DE SINCRONIZACIÓN MANUAL (Solo visible si logueado) -->
      <button id="syncBtn" class="menu-btn sync-btn" style="display: none;">
        <i class="fa-solid fa-cloud-arrow-up menu-btn-icon"></i>
        <span class="label">Guardar Progreso</span>
      </button>

    </nav>

  </div>

  <!-- Botón de Chat Fijo -->
  <a href="chat.html" class="chat-button" aria-label="Abrir chat">
    <i class="fa-solid fa-comments"></i>
  </a>

  <!-- Scripts Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // Configuración proporcionada
    const firebaseConfig = {
      apiKey: "AIzaSyBghFB_ziORhQHvrkQT08iwoh-N8CJKYpg",
      authDomain: "metodo-hibrido.firebaseapp.com",
      projectId: "metodo-hibrido",
      storageBucket: "metodo-hibrido.firebasestorage.app",
      messagingSenderId: "982967728212",
      appId: "1:982967728212:web:b27ea198c80601fc8315c1",
      measurementId: "G-PETF3C4DM9"
    };

    // Inicializar Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    // Usamos una ID segura para la ruta de la base de datos
    const APP_STORAGE_ID = typeof __app_id !== 'undefined' ? __app_id : 'metodo-hibrido-data';

    // Elementos del DOM
    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const syncBtn = document.getElementById('syncBtn');
    const userSection = document.getElementById('userSection');
    const loginSection = document.getElementById('loginSection');
    const userNameSpan = document.getElementById('userName');
    const userPhoto = document.getElementById('userPhoto');
    const syncStatus = document.getElementById('syncStatus');
    const toast = document.getElementById('toast');

    // Helpers
    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 4000);
    }

    function updateStatus(msg, isError = false) {
      syncStatus.textContent = msg;
      syncStatus.style.color = isError ? '#ff6b6b' : '#888';
    }

    // --- LÓGICA DE SINCRONIZACIÓN ---

    // 1. Subir LocalStorage a Firestore
    async function uploadData(user) {
      if (!user) return;
      updateStatus("Guardando en la nube...");
      
      try {
        // Convertir todo el localStorage a un objeto JSON
        const allData = {};
        for (let i = 0; i < localStorage.length; i++) {
          const key = localStorage.key(i);
          // Evitar guardar cosas internas de firebase
          if (!key.startsWith('firebase:')) {
            allData[key] = localStorage.getItem(key);
          }
        }
        
        allData.lastUpdated = new Date().toISOString(); // Marca de tiempo

        // RUTA CORREGIDA: artifacts -> ID -> users -> UID -> data -> backup (6 segmentos, PAR)
        const userDocRef = doc(db, 'artifacts', APP_STORAGE_ID, 'users', user.uid, 'data', 'backup');
        
        await setDoc(userDocRef, allData);
        
        updateStatus("Guardado correctamente");
        showToast("Progreso guardado en la nube");
        setTimeout(() => updateStatus(""), 3000);
      } catch (error) {
        console.error("Error subiendo datos:", error);
        if (error.code === 'permission-denied') {
          updateStatus("Error de permisos (Reglas)", true);
          showToast("Faltan permisos en Firebase. Revisa las Reglas.");
        } else {
          updateStatus("Error al guardar", true);
          showToast("Error: " + error.message);
        }
      }
    }

    // 2. Descargar Firestore a LocalStorage
    async function downloadData(user) {
      if (!user) return;
      updateStatus("Buscando datos...");

      try {
        // RUTA CORREGIDA: artifacts -> ID -> users -> UID -> data -> backup (6 segmentos, PAR)
        const userDocRef = doc(db, 'artifacts', APP_STORAGE_ID, 'users', user.uid, 'data', 'backup');
        const docSnap = await getDoc(userDocRef);

        if (docSnap.exists()) {
          updateStatus("Sincronizando...");
          const data = docSnap.data();
          
          // Escribir en LocalStorage
          Object.keys(data).forEach(key => {
            if (key !== 'lastUpdated') {
              localStorage.setItem(key, data[key]);
            }
          });
          
          updateStatus("Datos cargados");
          showToast("Datos recuperados de tu cuenta");
        } else {
          updateStatus("Cuenta nueva / Sin backup");
          // Opcional: Si es cuenta nueva, podríamos subir lo actual
        }
        setTimeout(() => updateStatus(""), 3000);
      } catch (error) {
        console.error("Error descargando datos:", error);
        if (error.code === 'permission-denied') {
            updateStatus("Error de permisos", true);
            showToast("Error: Permiso denegado en base de datos.");
        } else {
            updateStatus("Error de conexión", true);
            showToast("Error: " + error.message);
        }
      }
    }

    // --- EVENTOS DE AUTENTICACIÓN ---

    loginBtn.addEventListener('click', () => {
      signInWithPopup(auth, provider)
        .then((result) => {
          showToast("Sesión iniciada");
        }).catch((error) => {
          console.error(error);
          showToast("Error Login: " + error.message);
        });
    });

    logoutBtn.addEventListener('click', () => {
      const user = auth.currentUser;
      if(user) {
          // Intentamos guardar antes de salir
          uploadData(user).finally(() => {
              signOut(auth).then(() => {
                showToast("Sesión cerrada");
                updateStatus("");
              });
          });
      } else {
          signOut(auth);
      }
    });

    syncBtn.addEventListener('click', () => {
      const user = auth.currentUser;
      if (user) {
        uploadData(user);
      } else {
        showToast("Debes iniciar sesión primero");
      }
    });

    // --- MONITOR DE ESTADO ---

    onAuthStateChanged(auth, (user) => {
      if (user) {
        // Usuario logueado
        loginSection.style.display = 'none';
        userSection.style.display = 'flex';
        syncBtn.style.display = 'flex'; 
        
        // Actualizar UI
        userNameSpan.textContent = user.displayName || user.email.split('@')[0];
        userPhoto.src = user.photoURL || 'https://via.placeholder.com/30';

        // Cargar datos
        downloadData(user);

      } else {
        // Usuario fuera
        loginSection.style.display = 'flex';
        userSection.style.display = 'none';
        syncBtn.style.display = 'none';
        syncStatus.textContent = "";
      }
    });

  </script>
</body>
</html>
