<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plan de Entrenamiento - Entreno</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
    <!-- Chart.js y adaptador de fecha -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/date-fns"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0D0D0D;
            color: #E0E0E0;
            padding-bottom: 2rem;
        }
        /* New Button Styles */
        .day-nav-button {
            border: 1px solid #3f3f46;
            background: #18181b;
            color: #e5e7eb;
            border-radius: 10px;
            padding: 8px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 60px;
            text-align: center;
            transition: all 0.2s ease-in-out;
        }
        .day-nav-button span {
            font-size: 12px;
            font-weight: 900;
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
        }
        .day-nav-button.active {
            animation: active-pulse 1.3s infinite ease-in-out;
            border-color: #facc15;
        }
        @keyframes active-pulse {
            0% { transform: scale(1); filter: brightness(1); box-shadow: 0 0 0 rgba(255, 255, 255, 0); }
            50% { transform: scale(1.08); filter: brightness(1.3); box-shadow: 0 0 25px rgba(255, 255, 255, 0.3); }
            100% { transform: scale(1); filter: brightness(1); box-shadow: 0 0 0 rgba(255, 255, 255, 0); }
        }
        .day-nav-button-hd { background: linear-gradient(90deg, #d4d4d8, #a1a1aa); color: black; border-color: #71717a; }
        .day-nav-button-bilbo { background: linear-gradient(90deg, #facc15, #ca8a04); color: black; border-color: #a16207; }
        .day-nav-button-rest { background-color: #2dd4bf; color: white; border-color: #2dd4bf; }
        
        .header-background {
            position: relative;
            border-radius: 1.5rem;
            overflow: hidden;
            border: 1px solid #3f3f46;
        }
        .header-background::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.9) 0%, rgba(0, 0, 0, 0.1) 100%);
            z-index: 2;
        }
        .header-image {
            display: block; width: 100%; height: auto; border-radius: 1.5rem; z-index: 1;
        }
        .header-content {
            position: absolute; z-index: 3; bottom: 0; left: 0; right: 0;
            display: flex; justify-content: space-between; align-items: flex-end; padding: 1.5rem 2rem;
        }
        @media (max-width: 639px) {
            .header-content { padding: 1.5rem 1.5rem; align-items: center; }
            .header-content h1 { font-size: 1.875rem; line-height: 2.25rem; }
            .header-content p { font-size: 1.125rem; line-height: 1.75rem; }
            #stopwatch-display { font-size: 1.5rem; line-height: 2rem; }
        }

        .exercise-card {
            background-color: #18181b; border-radius: 0.75rem; padding: 1.5rem; border: 1px solid #3f3f46; overflow-x: auto;
        }
        .exercise-title { color: #2dd4bf; }
        .timer-clock {
            width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 1.25rem; cursor: pointer; transition: all 0.2s ease; flex-shrink: 0;
        }
        .timer-yellow { background-color: rgba(250, 204, 21, 0.1); border: 2px solid #facc15; color: #facc15; }
        .timer-yellow:hover { background-color: rgba(250, 204, 21, 0.2); }
        .timer-running { background-color: #facc15; color: #1A1A1A; }

        .series-table {
            width: 100%; margin-top: 1.5rem; border-collapse: collapse; table-layout: auto;
        }
        .series-table th, .series-table td {
            padding: 0.75rem 0.5rem; text-align: left; border-bottom: 1px solid #3f3f46; white-space: nowrap;
        }
        .series-table th { color: #a1a1aa; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .series-table tr:last-child td { border-bottom: none; }
        
        .weight-input, .reps-input {
            background-color: #0D0D0D; border: 1px solid #3f3f46; border-radius: 0.375rem; color: #E0E0E0;
            padding: 0.5rem; width: 100%; max-width: 70px; text-align: center; font-size: 1rem;
        }
        .weight-input { font-weight: 700; }
        .weight-input:focus, .reps-input:focus { outline: none; border-color: #facc15; }
        .effective-set .weight-input { border-color: #facc15; }

        .completed-card { border-color: #22c55e; opacity: 0.7; }
        .completed-card .exercise-title { text-decoration: line-through; color: #a1a1aa; }
        
        .custom-checkbox {
            -webkit-appearance: none; appearance: none; background-color: #3f3f46; margin: 0; font: inherit;
            color: currentColor; width: 1.5em; height: 1.5em; border: 0.15em solid #52525b; border-radius: 0.35em;
            transform: translateY(-0.075em); display: grid; place-content: center; cursor: pointer;
        }
        .custom-checkbox::before {
            content: ""; width: 0.8em; height: 0.8em; transform: scale(0); transition: 120ms transform ease-in-out;
            box-shadow: inset 1em 1em #22c55e; transform-origin: bottom left;
            clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
        }
        .custom-checkbox:checked::before { transform: scale(1); }

        .modal { z-index: 50; background-color: rgba(0, 0, 0, 0.85); backdrop-filter: blur(5px); }
        .modal-content { background-color: #18181b; border: 1px solid #3f3f46; }
        #notification { transition: opacity 0.5s, transform 0.5s; }
        
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
    </style>
</head>
<body class="p-4 sm:p-6 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="mb-8 header-background">
            <img src="https://yaril.netlify.app/metodohibridobigcolor3.jpg" alt="Fondo" class="header-image">
            <div class="header-content">
                <div>
                    <h1 id="main-title" class="text-3xl sm:text-4xl font-black text-white uppercase tracking-wider">HEAVY DUTY</h1>
                    <p id="workout-title" class="text-xl sm:text-2xl font-bold text-yellow-400 mt-1"></p>
                </div>
                <div id="stopwatch-container" class="text-right flex-shrink-0">
                    <div id="stopwatch-display" class="text-2xl sm:text-3xl font-bold text-white">00:00:00</div>
                    <button id="stopwatch-control" class="mt-2 w-full px-4 py-2 bg-green-600 hover:bg-green-700 transition-colors text-white font-semibold rounded-lg">Start / End</button>
                </div>
            </div>
        </header>

        <div id="tabs" class="grid grid-cols-7 gap-2 mb-8"></div>
        <main id="workout-content"></main>

        <div class="mt-12 text-center">
            <a href="index.html" class="inline-block w-full max-w-md mx-auto p-4 rounded-lg bg-zinc-700 hover:bg-zinc-600 text-white text-lg font-bold uppercase tracking-wider transition-all duration-200 hover:shadow-lg" style="text-decoration: none;">
                Inicio
            </a>
        </div>
    </div>

    <!-- Modals -->
    <div id="notification" class="fixed bottom-5 left-1/2 -translate-x-1/2 bg-green-600 text-white py-2 px-5 rounded-lg shadow-lg opacity-0 transform translate-y-10 z-50">
        Entrenamiento guardado con exito!!!
    </div>
    <div id="pause-modal" class="modal fixed inset-0 flex items-center justify-center hidden p-4">
        <div class="modal-content p-8 rounded-lg text-center shadow-lg max-w-sm w-full">
            <h2 class="text-2xl font-bold mb-6 text-white">Entrenamiento Pausado</h2>
            <div class="flex gap-4">
                <button id="resume-btn" class="flex-1 bg-green-600 hover:bg-green-700 transition-colors text-white font-semibold py-3 px-6 rounded-lg">Reanudar</button>
                <button id="finish-btn" class="flex-1 bg-red-600 hover:bg-red-700 transition-colors text-white font-semibold py-3 px-6 rounded-lg">Terminar</button>
            </div>
        </div>
    </div>
    <div id="finish-confirm-modal" class="modal fixed inset-0 flex items-center justify-center hidden p-4">
        <div class="modal-content p-8 rounded-lg text-center shadow-lg max-w-sm w-full">
            <h2 class="text-xl font-bold mb-6 text-white">¿Estas seguro de que quieres finalizar el entreno?</h2>
            <div class="flex gap-4">
                <button id="confirm-finish-no-btn" class="flex-1 bg-gray-600 hover:bg-gray-700 transition-colors text-white font-semibold py-3 px-6 rounded-lg">No</button>
                <button id="confirm-finish-yes-btn" class="flex-1 bg-red-600 hover:bg-red-700 transition-colors text-white font-semibold py-3 px-6 rounded-lg">Sí</button>
            </div>
        </div>
    </div>
    <div id="progression-modal" class="modal fixed inset-0 flex items-center justify-center hidden p-4">
        <div class="modal-content p-8 rounded-lg text-center shadow-lg max-w-sm w-full">
            <h2 id="progression-modal-title" class="text-xl font-bold mb-4 text-white">¡Buen trabajo!</h2>
            <p id="progression-modal-text" class="text-gray-300 mb-6"></p>
            <div class="flex gap-4">
                <button id="progress-no-btn" class="flex-1 bg-gray-600 hover:bg-gray-700 transition-colors text-white font-semibold py-3 px-6 rounded-lg">No, mantener</button>
                <button id="progress-yes-btn" class="flex-1 bg-green-600 hover:bg-green-700 transition-colors text-white font-semibold py-3 px-6 rounded-lg">Sí, subir peso</button>
            </div>
        </div>
    </div>
    <div id="bilbo-cycle-modal" class="modal fixed inset-0 flex items-center justify-center hidden p-4">
        <div class="modal-content p-8 rounded-lg text-center shadow-lg max-w-sm w-full">
            <h2 id="bilbo-cycle-title" class="text-xl font-bold mb-4 text-yellow-400">¡Ciclo Bilbo Completado!</h2>
            <p id="bilbo-cycle-text" class="text-gray-300 mb-6"></p>
            <button id="bilbo-cycle-ok-btn" class="w-full bg-blue-600 hover:bg-blue-700 transition-colors text-white font-semibold py-3 px-6 rounded-lg">Entendido</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // --- Configuration ---
            const workouts = {
                hd_push: { title: "HEAVY DUTY — PUSH", type: 'hd', exercises: [ 
                    { name: "Press inclinado con barra", rmPercentage: "30 / 50 / 80", seriesCount: 3, sets: [{reps: 15}, {reps: 10}, {reps: 6}], dropSet: false, tip: "3s↓ / 1-2s↑. Evita mirar arriba; foco en control. Siente los pies firmes y el glúteo activo.", rest: 135 },
                    { name: "Press en suelo con barra", rmPercentage: "30 / 50 / 80", seriesCount: 3, sets: [{reps: 15}, {reps: 10}, {reps: 6}], dropSet: true, tip: "3s↓ / 1s pausa / 1s↑. Cuello neutro, pectoral pleno.", rest: 165 },
                    { name: "Landmine Diagonal de Pie (Hombro–Techo)", rmPercentage: "30 / 50 / 80", seriesCount: 3, sets: [{reps: 15}, {reps: 10}, {reps: 6}], dropSet: false, tip: "2s↓ / 1s↑. Empuje diagonal hasta línea de ojos.", rest: 135 },
                    { name: "Elevaciones laterales sentado", rmPercentage: "30 / 50 / 80", seriesCount: 3, sets: [{reps: 15}, {reps: 10}, {reps: 6}], dropSet: true, tip: "2s↓ / 1s↑. Movimiento limpio, hombros bajos.", rest: 105 },
                    { name: "Extensión de tríceps en polea con cuerda", rmPercentage: "30 / 50 / 80", seriesCount: 3, sets: [{reps: 15}, {reps: 10}, {reps: 6}], dropSet: true, tip: "2s↓ / 1s↑. Hombros bajos, respiración fluida.", rest: 105 }, 
                ] },
                rest1: { title: "CARDIO", type: 'rest', exercises: [ { name: "Cardio Z2", tip: "Caminata larga o cardio en Z2. Sin sobrepasar las 130 pulsaciones.", rest: 0 } ] },
                hd_pull: { title: "HEAVY DUTY — PULL", type: 'hd', exercises: [ 
                    { name: "Jalón en polea agarre neutro", rmPercentage: "30 / 50 / 80", seriesCount: 3, sets: [{reps: 15}, {reps: 10}, {reps: 6}], dropSet: true, tip: "3s↓ / 1s pausa / 1-2s↑. Controla la subida, mirada neutra.", rest: 165 },
                    { name: "Remo con barra T", rmPercentage: "30 / 50 / 80", seriesCount: 3, sets: [{reps: 15}, {reps: 10}, {reps: 6}], dropSet: false, tip: "3s↓ / 1s↑. Espalda recta, mirada al suelo.", rest: 165 },
                    { name: "Pájaros (reverse fly)", rmPercentage: "30 / 50 / 80", seriesCount: 3, sets: [{reps: 15}, {reps: 10}, {reps: 6}], dropSet: true, tip: "3s↓ / 1s↑ / 1s pausa. Cuello neutro, sin impulso.", rest: 105 },
                    { name: "Curl de bíceps Mentzer (polea baja)", rmPercentage: "30 / 50 / 80", seriesCount: 3, sets: [{reps: 15}, {reps: 10}, {reps: 6}], dropSet: true, tip: "3s↓ / 1s↑ / 1s contracción. Codos móviles, apretando arriba.", rest: 105 },
                    { name: "Face Pull (polea a cara)", rmPercentage: "30 / 50 / 80", seriesCount: 3, sets: [{reps: 15}, {reps: 10}, {reps: 6}], dropSet: false, tip: "2s↓ / 1s↑. Rotación externa, hombros bajos.", rest: 105 }, 
                ] },
                rest2: { title: "CARDIO", type: 'rest', exercises: [ { name: "Cardio Z2", tip: "Caminata larga o cardio en Z2.", rest: 0 } ] },
                bilbo_push: { title: "BILBO — PUSH", type: 'bilbo', exercises: [ 
                    { name: "Press de banca plano (barra)", rmPercentage: "50 / 65 / 75", seriesCount: 3, sets: [{reps: '15-50'}, {reps: '10-15'}, {reps: '8-12'}], dropSet: false, tip: "Ejecución rápida. Sin bloqueo de codos.", rest: 105 },
                    { name: "Landmine Rodilla al Suelo (Cintura–Cabeza)", rmPercentage: "50 / 65 / 75", seriesCount: 3, sets: [{reps: '15-50'}, {reps: '10-15'}, {reps: '8-12'}], dropSet: false, tip: "Ejecución rápida. Empuje diagonal amplio.", rest: 105 },
                    { name: "Elevaciones laterales con gomas", rmPercentage: "60 / 70 / 75", seriesCount: 3, sets: [{reps: '15-50'}, {reps: '10-15'}, {reps: '8-12'}], dropSet: false, tip: "Ejecución rápida. Hombros bajos, sin impulso.", rest: 75 },
                    { name: "Fondos agarre neutro (cerrado)", rmPercentage: "55 / 65 / 75", seriesCount: 3, sets: [{reps: '15-50'}, {reps: '10-15'}, {reps: '8-12'}], dropSet: false, tip: "Ejecución rápida. Codos pegados, rango medio.", rest: 105 },
                    { name: "Cruces con goma (pecho)", rmPercentage: "55 / 65 / 70", seriesCount: 3, sets: [{reps: '15-50'}, {reps: '10-15'}, {reps: '8-12'}], dropSet: false, tip: "Ejecución rápida. Cruza al centro, aprieta 1s.", rest: 75 }, 
                ] },
                rest3: { title: "CARDIO", type: 'rest', exercises: [ { name: "Cardio Z2", tip: "Caminata larga o cardio en Z2.", rest: 0 } ] },
                bilbo_pull: { title: "BILBO — PULL", type: 'bilbo', exercises: [ 
                    { name: "Jalón al pecho agarre estrecho", rmPercentage: "50 / 65 / 75", seriesCount: 3, sets: [{reps: '15-50'}, {reps: '10-15'}, {reps: '8-12'}], dropSet: false, tip: "Ejecución rápida. Tira al pecho, mirada neutra.", rest: 120 },
                    { name: "Remo bajo con polea (agarre neutro)", rmPercentage: "55 / 70 / 75", seriesCount: 3, sets: [{reps: '15-50'}, {reps: '10-15'}, {reps: '8-12'}], dropSet: false, tip: "Ejecución rápida. Movimiento fluido, sin arqueo lumbar.", rest: 120 },
                    { name: "Remo Inclinado 30º, Mancuernas, Neutro", rmPercentage: "55 / 65 / 75", seriesCount: 3, sets: [{reps: '15-50'}, {reps: '10-15'}, {reps: '8-12'}], dropSet: false, tip: "Ejecución rápida. Tronco 30°, codos pegados.", rest: 120 },
                    { name: "Curl en barra Z", rmPercentage: "55 / 65 / 75", seriesCount: 3, sets: [{reps: '15-50'}, {reps: '10-15'}, {reps: '8-12'}], dropSet: false, tip: "Ejecución rápida. Codos fijos, hombros relajados.", rest: 75 }, 
                ] }
            };
            const days = ['hd_push', 'rest1', 'hd_pull', 'rest2', 'bilbo_push', 'rest3', 'bilbo_pull'];
            const dayNames = { hd_push: 'HD PUSH', rest1: 'CARDIO', hd_pull: 'HD PULL', rest2: 'CARDIO', bilbo_push: 'BILBO PUSH', rest3: 'CARDIO', bilbo_pull: 'BILBO PULL' };
            
            let e1rmMap = new Map(); 
            const state = { activeTimers: {}, stopwatchInterval: null, totalSeconds: 0, isStopwatchRunning: false };
            
            const DOM = {
                tabsContainer: document.getElementById('tabs'),
                contentContainer: document.getElementById('workout-content'),
                mainTitle: document.getElementById('main-title'),
                workoutTitle: document.getElementById('workout-title'),
                stopwatchDisplay: document.getElementById('stopwatch-display'),
                stopwatchControlBtn: document.getElementById('stopwatch-control'),
                pauseModal: document.getElementById('pause-modal'),
                finishConfirmModal: document.getElementById('finish-confirm-modal'),
                progressionModal: document.getElementById('progression-modal'),
                bilboCycleModal: document.getElementById('bilbo-cycle-modal'),
                notification: document.getElementById('notification'),
                resumeBtn: document.getElementById('resume-btn'),
                finishBtn: document.getElementById('finish-btn'),
                confirmFinishYesBtn: document.getElementById('confirm-finish-yes-btn'),
                confirmFinishNoBtn: document.getElementById('confirm-finish-no-btn'),
                progressYesBtn: document.getElementById('progress-yes-btn'),
                progressNoBtn: document.getElementById('progress-no-btn'),
                bilboCycleOkBtn: document.getElementById('bilbo-cycle-ok-btn'),
                progressionModalText: document.getElementById('progression-modal-text'),
                bilboCycleText: document.getElementById('bilbo-cycle-text'),
            };

            const getTodayDateString = () => new Date().toISOString().split('T')[0];
            
            const calculateLombardi = (weight, reps) => {
                if (reps <= 0 || weight <= 0) return 0;
                return parseFloat(weight) * Math.pow(parseFloat(reps), 0.10);
            };
            
            const calculateAllEstimated1RMs = () => {
                const history = JSON.parse(localStorage.getItem('workoutHistory')) || {};
                const exercisesToTrack = [
                    "Press de banca plano (barra)", "Curl en barra Z", "Jalón en polea agarre neutro", "Jalón al pecho agarre estrecho"
                ];
                const map = new Map();
                for (const date in history) {
                    const log = history[date];
                    if (log && Array.isArray(log.exercises)) {
                        log.exercises.forEach(ex => {
                            if (exercisesToTrack.includes(ex.name) && Array.isArray(ex.series)) {
                                ex.series.forEach(s => {
                                    const w = parseFloat(s.weight), r = parseInt(s.reps, 10);
                                    if (w > 0 && r > 0) {
                                        const e1rm = calculateLombardi(w, r);
                                        if (e1rm > (map.get(ex.name) || 0)) map.set(ex.name, e1rm);
                                    }
                                });
                            }
                        });
                    }
                }
                return map;
            };

            function generateWorkoutHTML() {
                days.forEach(day => {
                    const dayContainer = document.createElement('div');
                    dayContainer.id = day;
                    dayContainer.className = 'workout-day hidden';
                    const workout = workouts[day];

                    workout.exercises.forEach((exercise, exIndex) => {
                        const isStrengthDay = workout.type !== 'rest';
                        const card = document.createElement('div');
                        card.className = 'exercise-card';
                        card.dataset.day = day;
                        card.dataset.exIndex = exIndex;

                        let headerHTML = `
                            <div class="flex justify-between items-start gap-4">
                                <div class="flex-grow">
                                    <h3 class="exercise-title text-xl font-bold mb-4">${exercise.name}</h3>
                                    <div class="text-sm text-gray-400 space-y-1">
                                        ${isStrengthDay ? `<div><strong>% 1RM:</strong> ${exercise.rmPercentage}</div>
                                        <div><strong>Series:</strong> ${exercise.seriesCount} ${exercise.dropSet ? '| <span class="text-yellow-500">Drop Set: Sí</span>' : ''}</div>` : ''}
                                        <div><strong>Consejo:</strong> ${exercise.tip}</div>
                                    </div>
                                </div>
                                ${isStrengthDay ? `
                                    <div class="timer-clock timer-yellow" data-duration="${exercise.rest}">
                                        ${Math.floor(exercise.rest / 60)}:${(exercise.rest % 60).toString().padStart(2, '0')}
                                    </div>
                                ` : ''}
                            </div>
                        `;

                        let seriesRows = '';
                        let tableHeader = '';
                        
                        if (isStrengthDay) {
                            tableHeader = `
                                <thead>
                                    <tr>
                                        <th class="text-left">Serie</th>
                                        <th class="text-center">Peso (KG)</th>
                                        <th class="text-center">Reps</th>
                                        <th class="text-center">Últ. Peso</th>
                                        <th class="text-center">Últ. Reps</th>
                                        <th class="text-center">Reps Acons.</th>
                                        <th class="text-right">% 1RM</th>
                                    </tr>
                                </thead>`;
                            
                            const rmValues = exercise.rmPercentage ? exercise.rmPercentage.replace(/%/g, '').split('/').map(v => v.trim()) : [];
                            
                            let rows = '';
                            exercise.sets.forEach((set, setIndex) => {
                                const isBilboDay = day.includes('bilbo');
                                const isEffective = (isBilboDay && setIndex === 0) || (!isBilboDay && setIndex === exercise.sets.length - 1);
                                const rowClass = isEffective ? 'effective-set' : '';
                                
                                let seriesName = isBilboDay 
                                    ? (setIndex === 0 ? 'Serie Bilbo' : `Serie ${setIndex + 1}`) 
                                    : (isEffective ? 'Serie' : `Calentamiento ${setIndex + 1}`);
                                
                                const currentRm = rmValues[setIndex] || (rmValues.length === 1 ? rmValues[0] : '');
                                const rmDisplay = currentRm ? (isNaN(currentRm) ? currentRm : `${currentRm}%`) : '';
                                
                                const tdClass = isEffective ? 'text-white font-bold' : 'text-gray-400';

                                rows += `
                                    <tr class="set-row ${rowClass}">
                                        <td class="${tdClass}">${seriesName}</td>
                                        <td class="text-center"><input type="number" step="0.5" class="weight-input" placeholder="0" data-day="${day}" data-ex-index="${exIndex}" data-set-index="${setIndex}"></td>
                                        <td class="text-center"><input type="number" class="reps-input" placeholder="0" data-day="${day}" data-ex-index="${exIndex}" data-set-index="${setIndex}"></td>
                                        <td class="text-center text-gray-500 last-weight-cell">-</td>
                                        <td class="text-center text-gray-500 last-reps-cell">-</td>
                                        <td class="text-center ${tdClass}">${set.reps}</td>
                                        <td class="text-right ${tdClass}">${rmDisplay}</td>
                                    </tr>
                                `;
                            });
                            seriesRows = `<tbody>${rows}</tbody>`;

                        } else {
                            tableHeader = `<thead><tr><th class="text-center">Tiempo (min)</th><th class="text-center">Pulso (BPM)</th></tr></thead>`;
                            seriesRows = `<tbody><tr class="set-row"><td class="text-center"><input type="number" step="1" class="weight-input" placeholder="0" data-day="${day}" data-ex-index="${exIndex}" data-set-index="0"></td><td class="text-center"><input type="number" class="reps-input" placeholder="0" data-day="${day}" data-ex-index="${exIndex}" data-set-index="0"></td></tr></tbody>`;
                        }

                        card.innerHTML = headerHTML + `<table class="series-table">${tableHeader}${seriesRows}</table>` + `
                            <div class="mt-4 flex items-center gap-2">
                                <input type="checkbox" class="custom-checkbox" data-day="${day}" data-ex-index="${exIndex}">
                                <label class="text-sm text-gray-400">Marcar como completado</label>
                            </div>
                        `;
                        
                        dayContainer.appendChild(card);
                    });
                    DOM.contentContainer.appendChild(dayContainer);
                });
            }

            function showDay(dayToShow) {
                document.querySelectorAll('.workout-day').forEach(el => el.classList.add('hidden'));
                document.querySelectorAll('.day-nav-button').forEach(btn => btn.classList.remove('active'));
                
                const btn = document.querySelector(`.day-nav-button[data-day="${dayToShow}"]`);
                if (btn) btn.classList.add('active');
                
                const dayContent = document.getElementById(dayToShow);
                if (dayContent) dayContent.classList.remove('hidden');
                
                const workoutInfo = workouts[dayToShow];
                if (workoutInfo) {
                    if (dayToShow.includes('hd')) {
                        DOM.mainTitle.textContent = "HEAVY DUTY";
                        DOM.workoutTitle.innerHTML = dayToShow.includes('push') ? "PUSH" : "PULL";
                    } else if (dayToShow.includes('bilbo')) {
                        DOM.mainTitle.textContent = "MÉTODO BILBO";
                        const cycle = localStorage.getItem('bilboCycleCount') || '1';
                        const type = dayToShow.includes('push') ? "PUSH" : "PULL";
                        DOM.workoutTitle.innerHTML = `${type} <span class="text-white text-sm font-normal ml-2">Ciclo ${cycle}</span>`;
                    } else {
                        DOM.mainTitle.textContent = "CARDIO";
                        DOM.workoutTitle.innerHTML = "Descanso Activo (Z2)";
                    }
                }
            }

            // --- Timers ---
            function startTimer(duration, element) {
                const timerId = `${element.dataset.day}-${element.dataset.exIndex}`; 
                if (state.activeTimers[timerId]) clearInterval(state.activeTimers[timerId]);
                
                element.classList.add('timer-running');
                let t = duration;
                
                state.activeTimers[timerId] = setInterval(() => {
                    const m = Math.floor(t / 60);
                    const s = t % 60;
                    element.textContent = `${m}:${s.toString().padStart(2,'0')}`;
                    t--;
                    if (t < 0) {
                        clearInterval(state.activeTimers[timerId]);
                        element.classList.remove('timer-running');
                        element.textContent = "0:00";
                        const synth = new Tone.Synth().toDestination();
                        synth.triggerAttackRelease("C5", "8n");
                    }
                }, 1000);
            }

            function toggleStopwatch() {
                if (state.isStopwatchRunning) {
                    state.isStopwatchRunning = false;
                    clearInterval(state.stopwatchInterval);
                    DOM.pauseModal.classList.remove('hidden');
                } else {
                    state.isStopwatchRunning = true;
                    DOM.stopwatchControlBtn.textContent = "Pausar / End";
                    state.stopwatchInterval = setInterval(() => {
                        state.totalSeconds++;
                        const h = Math.floor(state.totalSeconds / 3600).toString().padStart(2,'0');
                        const m = Math.floor((state.totalSeconds % 3600) / 60).toString().padStart(2,'0');
                        const s = (state.totalSeconds % 60).toString().padStart(2,'0');
                        DOM.stopwatchDisplay.textContent = `${h}:${m}:${s}`;
                    }, 1000);
                }
            }

            // --- Load & Save ---
            function loadLastPerformance(map) {
                const history = JSON.parse(localStorage.getItem('workoutHistory')) || {};
                const dates = Object.keys(history).sort().reverse();
                const bilboResets = JSON.parse(localStorage.getItem('bilboResetFlags')) || {};
                const progFlags = JSON.parse(localStorage.getItem('progressionFlags')) || {};

                document.querySelectorAll('.exercise-card').forEach(card => {
                    const day = card.dataset.day;
                    const exIdx = parseInt(card.dataset.exIndex);
                    const exName = workouts[day].exercises[exIdx].name;
                    const isBilbo = day.includes('bilbo');

                    // Reset inputs
                    card.querySelectorAll('input[type="number"]').forEach(i => i.value = '');
                    
                    // Find last log
                    let lastLog = null;
                    for (let d of dates) {
                        const s = history[d].exercises.find(e => e.name === exName);
                        if (s) { lastLog = s; break; }
                    }

                    // Update "Last" displays
                    const lastWeights = card.querySelectorAll('.last-weight-cell');
                    const lastReps = card.querySelectorAll('.last-reps-cell');
                    
                    if (lastLog && lastLog.series) {
                        lastLog.series.forEach((s, i) => {
                            if (lastWeights[i]) lastWeights[i].textContent = s.weight;
                            if (lastReps[i]) lastReps[i].textContent = s.reps;
                        });
                    }

                    // Suggest Weights
                    const inputs = card.querySelectorAll('.weight-input');
                    const rmStr = workouts[day].exercises[exIdx].rmPercentage || "";
                    const percentages = rmStr.split('/').map(s => parseFloat(s)/100);

                    if (isBilbo) {
                        const e1rm = map.get(exName) || 0;
                        const reset = bilboResets[exName];
                        
                        if (e1rm > 0) {
                             inputs.forEach((inp, idx) => {
                                const pct = percentages[idx] || 0.5;
                                inp.value = (e1rm * pct).toFixed(1);
                             });
                        }
                    } else if (day.includes('hd') && lastLog) {
                        lastLog.series.forEach((s, i) => {
                            if (inputs[i]) {
                                let w = parseFloat(s.weight);
                                if (i === 2 && progFlags[exName]) w *= 1.025; // +2.5%
                                inputs[i].value = w.toFixed(1);
                            }
                        });
                    }
                });
            }

            function finishWorkout() {
                const today = getTodayDateString();
                const h = JSON.parse(localStorage.getItem('workoutHistory')) || {};
                const exercises = [];
                let dayKey = null;

                const activeBtn = document.querySelector('.day-nav-button.active');
                if(activeBtn) dayKey = activeBtn.dataset.day;

                if(dayKey) {
                    const cards = document.querySelectorAll(`.exercise-card[data-day="${dayKey}"]`);
                    const bilboResets = [];
                    const progChecks = [];

                    cards.forEach(card => {
                        const chk = card.querySelector('.custom-checkbox');
                        if (chk && chk.checked) {
                            const exName = card.querySelector('.exercise-title').textContent;
                            const series = [];
                            card.querySelectorAll('.set-row').forEach(row => { // Updated to select tr with class set-row
                                const w = row.querySelector('.weight-input').value;
                                const r = row.querySelector('.reps-input').value;
                                series.push({ weight: w, reps: r });
                            });
                            exercises.push({ name: exName, series });

                            if (dayKey.includes('bilbo') && series.length > 0) {
                                if (parseInt(series[0].reps) <= 15) {
                                    bilboResets.push(exName);
                                }
                            }
                            if (dayKey.includes('hd') && series.length > 0) {
                                const lastSet = series[series.length-1];
                                if (parseInt(lastSet.reps) >= 6) {
                                    progChecks.push(exName);
                                }
                            }
                        }
                    });

                    if (exercises.length > 0) {
                        h[today] = {
                            date: today,
                            time: DOM.stopwatchDisplay.textContent,
                            workoutTitle: workouts[dayKey].title,
                            workoutType: workouts[dayKey].type,
                            exercises: exercises
                        };
                        localStorage.setItem('workoutHistory', JSON.stringify(h));
                        
                        if (bilboResets.length > 0) {
                            const flags = JSON.parse(localStorage.getItem('bilboResetFlags')) || {};
                            bilboResets.forEach(n => flags[n] = true);
                            localStorage.setItem('bilboResetFlags', JSON.stringify(flags));
                            
                            let cycle = parseInt(localStorage.getItem('bilboCycleCount') || '1');
                            DOM.bilboCycleText.textContent = `Has completado el ciclo para: ${bilboResets.join(', ')}. Se recalcularán los pesos.`;
                            DOM.bilboCycleModal.classList.remove('hidden');
                        }
                        
                        if (progChecks.length > 0) {
                            window.pendingProgressions = progChecks;
                            showNextProgressModal();
                        }
                        
                        DOM.notification.classList.remove('opacity-0', 'translate-y-10');
                        setTimeout(() => DOM.notification.classList.add('opacity-0', 'translate-y-10'), 3000);
                    }
                }
                
                state.isStopwatchRunning = false;
                clearInterval(state.stopwatchInterval);
                DOM.stopwatchControlBtn.textContent = "Start / End";
            }

            function showNextProgressModal() {
                if (!window.pendingProgressions || window.pendingProgressions.length === 0) return;
                const exName = window.pendingProgressions.shift();
                window.currentProgressionEx = exName;
                document.getElementById('progression-modal-text').textContent = `¿Serie perfecta en ${exName}? ¿Subir peso?`;
                document.getElementById('progression-modal').classList.remove('hidden');
            }

            // --- Init ---
            days.forEach(d => {
                const btn = document.createElement('div');
                btn.className = `day-nav-button ${d.includes('hd') ? 'day-nav-button-hd' : d.includes('bilbo') ? 'day-nav-button-bilbo' : 'day-nav-button-rest'}`;
                btn.dataset.day = d;
                btn.innerHTML = `<span>${dayNames[d]}</span>`;
                btn.addEventListener('click', () => showDay(d));
                DOM.tabsContainer.appendChild(btn);
            });

            generateWorkoutHTML();
            
            DOM.stopwatchControlBtn.addEventListener('click', toggleStopwatch);
            DOM.resumeBtn.addEventListener('click', () => { DOM.pauseModal.classList.add('hidden'); toggleStopwatch(); });
            DOM.finishBtn.addEventListener('click', () => { DOM.pauseModal.classList.add('hidden'); DOM.finishConfirmModal.classList.remove('hidden'); });
            
            document.getElementById('confirm-finish-no-btn').addEventListener('click', () => DOM.finishConfirmModal.classList.add('hidden'));
            document.getElementById('confirm-finish-yes-btn').addEventListener('click', () => { DOM.finishConfirmModal.classList.add('hidden'); finishWorkout(); });
            
            document.getElementById('bilbo-cycle-ok-btn').addEventListener('click', () => DOM.bilboCycleModal.classList.add('hidden'));
            
            document.getElementById('progress-no-btn').addEventListener('click', () => {
                document.getElementById('progression-modal').classList.add('hidden');
                showNextProgressModal();
            });
            document.getElementById('progress-yes-btn').addEventListener('click', () => {
                const flags = JSON.parse(localStorage.getItem('progressionFlags')) || {};
                flags[window.currentProgressionEx] = true;
                localStorage.setItem('progressionFlags', JSON.stringify(flags));
                document.getElementById('progression-modal').classList.add('hidden');
                showNextProgressModal();
            });

            DOM.contentContainer.addEventListener('click', e => {
                if (e.target.classList.contains('timer-clock')) startTimer(e.target.dataset.duration, e.target);
                if (e.target.classList.contains('custom-checkbox')) {
                    e.target.closest('.exercise-card').classList.toggle('completed-card', e.target.checked);
                }
            });

            e1rmMap = calculateAllEstimated1RMs();
            let startDay = days[0];
            showDay(startDay);
            loadLastPerformance(e1rmMap);

        });
    </script>
</body>
</html>
